  Pending:  { color:"#d97706", light:"#fef3c7" },
  Canceled: { color:"#9ca3af", light:"#f3f4f6" },
};
const MONTHS = [
  { label:"APRIL 2026",  start:0,  days:30 },
  { label:"MAY 2026",    start:30, days:31 },
  { label:"JUNE 2026",   start:61, days:30 },
];
const DAYS = 91;
const START = new Date("2026-04-01");
const TODAY_OFF = Math.round((new Date("2026-04-22") - START) / 86400000);
const WEEKS = [0,7,14,21,28,35,42,49,56,63,70,77,84];
const SECTIONS = ["All","Backyard","External Front","First Floor","Ground Floor","Basement","Second Floor","General"];

function toOff(d){ if(!d) return null; const dt=new Date(d); return isNaN(dt)?null:Math.round((dt-START)/86400000); }

let activeSection = "All";

function render() {
  const filtered = activeSection==="All" ? RAW : RAW.filter(t=>t.section===activeSection);
  const withDate = [...filtered].filter(t=>t.date).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const noDate   = filtered.filter(t=>!t.date);

  const total    = RAW.length;
  const done     = RAW.filter(t=>t.status==="Done").length;
  const canceled = RAW.filter(t=>t.status==="Canceled").length;
  const pending  = total - done - canceled;
  const pct      = Math.round(done/total*100);

  const sStats = Object.keys(SC).map(s=>{
    const g=RAW.filter(t=>t.section===s);
    const d=g.filter(t=>t.status==="Done").length;
    return {s,total:g.length,done:d,pct:Math.round(d/g.length*100),color:SC[s]};
  });

  const LW = 295;

  // TABS
  const tabsHTML = SECTIONS.map(s=>{
    const active = s===activeSection;
    const color  = s==="All" ? "#b8893a" : SC[s]||"#b8893a";
    return `<button class="stab" data-sec="${s}" style="
      padding:5px 16px;font-size:10px;letter-spacing:0.1em;font-weight:500;
      background:${active?color+"18":"transparent"};
      color:${active?color:"#8a7a6a"};
      border:1px solid ${active?color+"88":"#d4ccc0"};
      border-radius:20px;">${s.toUpperCase()}</button>`;
  }).join("");

  // SECTION PROGRESS
  const spHTML = sStats.map(({s,total:t,done:d,pct:p,color})=>`
    <div style="flex:1 1 110px;min-width:95px">
      <div style="display:flex;justify-content:space-between;font-size:9.5px;margin-bottom:4px">
        <span style="color:#6a5f4a">${s}</span>
        <span style="color:${color};font-weight:600">${p}%</span>
      </div>
      <div style="height:4px;background:#e8e0d0;border-radius:2px">
        <div style="width:${p}%;height:100%;background:${color};border-radius:2px"></div>
      </div>
      <div style="font-size:9px;color:#9a8a78;margin-top:3px">${d}/${t} done</div>
    </div>`).join("");

  // MONTH HEADER
  const monthH = MONTHS.map(({label,start,days})=>`
    <div style="position:absolute;left:${start/DAYS*100}%;width:${days/DAYS*100}%;height:100%;
      border-left:1px solid #d4ccc0;display:flex;align-items:center;padding-left:12px;
      font-size:9.5px;letter-spacing:0.14em;color:#b8893a;font-weight:600">${label}</div>`).join("");

  const weekTicks = WEEKS.map(w=>
    `<div style="position:absolute;left:${w/DAYS*100}%;top:0;bottom:0;width:1px;background:#ece8e0"></div>`
  ).join("");

  // TASK ROWS
  const rowsHTML = withDate.map((task,i)=>{
    const off    = toOff(task.date);
    const bEnd   = off;
    const bStart = Math.max(0, bEnd-5);
    const lPct   = bStart/DAYS*100;
    const wPct   = Math.max((bEnd-bStart+1)/DAYS*100, 0.6);
    const sCfg   = STATUS_CFG[task.status]||STATUS_CFG.Pending;
    const sColor = SC[task.section]||"#b8893a";
    const isDone = task.status==="Done";
    const isCanceled = task.status==="Canceled";
    const bg = i%2===0 ? "#ffffff" : "#faf7f3";

    const barBg = isDone
      ? `background:${sCfg.color};`
      : isCanceled
      ? `background:repeating-linear-gradient(45deg,${sCfg.color}55 0px,${sCfg.color}55 4px,transparent 4px,transparent 8px);border:1px solid ${sCfg.color};`
      : `background:${sCfg.color};opacity:0.82;`;

    const monthDivs = MONTHS.map(({start})=>
      `<div style="position:absolute;left:${start/DAYS*100}%;top:0;bottom:0;width:1px;background:#e8e0d0"></div>`
    ).join("");
    const wkLines = WEEKS.map(w=>
      `<div style="position:absolute;left:${w/DAYS*100}%;top:0;bottom:0;width:1px;background:#f0ece4"></div>`
    ).join("");

    return `
    <div class="tr" style="display:flex;height:46px;border-bottom:1px solid #ede8e0;background:${bg};position:relative">
      <div style="width:${LW}px;min-width:${LW}px;padding:4px 14px;display:flex;align-items:center;gap:8px;border-right:1px solid #e0d8cc;overflow:hidden">
        <span style="font-size:9px;color:#c0b090;font-weight:500;flex-shrink:0;width:22px;text-align:right">${task.ref}</span>
        <span style="width:3px;height:18px;background:${sColor};border-radius:2px;flex-shrink:0;opacity:${isCanceled?0.35:0.8}"></span>
        <div style="flex:1;overflow:hidden">
          <div style="font-size:11px;color:${isCanceled?"#b0a090":"#2a2018"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:${isCanceled?"line-through":"none"}" title="${task.desc}">${task.desc}</div>
          <div style="font-size:9.5px;color:#b0a080;margin-top:1px;direction:rtl;text-align:right;font-family:system-ui,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" dir="rtl" title="${task.ar}">${task.ar}</div>
        </div>
      </div>
      <div style="flex:1;position:relative">
        ${monthDivs}${wkLines}
        <div style="position:absolute;left:${TODAY_OFF/DAYS*100}%;top:0;bottom:0;width:2px;background:${isDone?"rgba(220,38,38,0.18)":"rgba(220,38,38,0.55)"};z-index:3"></div>
        <div style="position:absolute;left:${lPct}%;width:${wPct}%;top:50%;transform:translateY(-50%);height:${isDone?14:12}px;border-radius:4px;z-index:2;${barBg}"></div>
        <div class="tooltip">
          <span style="font-size:9px;color:${sColor};background:#fff;padding:2px 8px;border-radius:3px;border:1px solid ${sColor}55;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.08)">${task.section} · ${task.area}</span>
          <span style="font-size:9px;color:#6a5f4a;background:#fff;padding:2px 8px;border-radius:3px;border:1px solid #d4ccc0;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.08)">${task.responsible}</span>
          <span style="font-size:9px;color:${sCfg.color};background:#fff;padding:2px 8px;border-radius:3px;border:1px solid ${sCfg.color}77;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.08)">↦ ${task.date}</span>
        </div>
      </div>
    </div>`;
  }).join("");

  // NO DATE ROWS
  const noDateHTML = noDate.length===0 ? "" : `
    <div style="padding:9px 16px;background:#f5f0e8;border-top:1px solid #ddd6c8;border-bottom:1px solid #ddd6c8;font-size:9px;letter-spacing:0.18em;color:#9a8a70">
      PENDING DATE ASSIGNMENT — ${noDate.length} ITEMS
    </div>
    ${noDate.map((task,i)=>{
      const sColor=SC[task.section]||"#b8893a";
      const isCanceled=task.status==="Canceled";
      return `
      <div class="tr" style="display:flex;height:46px;border-bottom:1px solid #ede8e0;background:${i%2===0?"#fff":"#faf7f3"}">
        <div style="width:${LW}px;min-width:${LW}px;padding:4px 14px;display:flex;align-items:center;gap:8px;border-right:1px solid #e0d8cc;overflow:hidden">
          <span style="font-size:9px;color:#c0b090;font-weight:500;flex-shrink:0;width:22px;text-align:right">${task.ref}</span>
          <span style="width:3px;height:18px;background:${sColor};border-radius:2px;flex-shrink:0;opacity:0.3"></span>
          <div style="flex:1;overflow:hidden">
            <div style="font-size:11px;color:${isCanceled?"#b0a090":"#8a7a68"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:${isCanceled?"line-through":"none"}">${task.desc}</div>
            <div style="font-size:9.5px;color:#c0b090;margin-top:1px;direction:rtl;text-align:right;font-family:system-ui,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" dir="rtl">${task.ar}</div>
          </div>
        </div>
        <div style="flex:1;display:flex;align-items:center;padding-left:16px;gap:10px">
          <span style="font-size:9px;letter-spacing:0.1em;color:${isCanceled?"#9ca3af":"#8a7a68"};border:1px solid ${isCanceled?"#d1d5db":"#c8bfb0"};border-radius:12px;padding:2px 10px;background:${isCanceled?"#f9fafb":"#f7f4ef"}">${isCanceled?"CANCELED":"DATE TBD"}</span>
          <span style="font-size:9.5px;color:#9a8a78">${task.responsible}</span>
          <span style="font-size:9.5px;color:${sColor}99">${task.section}</span>
        </div>
      </div>`;
    }).join("")}`;

  document.getElementById("root").innerHTML = `
  <div style="font-family:'Jost',system-ui,sans-serif;background:#f7f4ef;min-height:100vh;color:#1a1612">

    <!-- HEADER -->
    <div style="background:#ffffff;border-bottom:3px solid #b8893a;padding:24px 32px 18px;box-shadow:0 1px 8px rgba(0,0,0,0.06)">
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:600;letter-spacing:0.06em;color:#1a1612">VILLA 4 — PUNCH LIST TRACKER</div>
          <div style="font-size:11px;color:#9a8a70;letter-spacing:0.12em;margin-top:5px">REVISION 03 &nbsp;·&nbsp; AS OF APRIL 22, 2026 &nbsp;·&nbsp; RCC – DESIGN &amp; SUPERVISION</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;color:#b8a888;letter-spacing:0.14em">PROJECT</div>
          <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:#b8893a;letter-spacing:0.08em;font-weight:600">VILLA 4</div>
        </div>
      </div>
    </div>

    <!-- KPI CARDS -->
    <div style="display:flex;gap:10px;padding:16px 32px;background:#f7f4ef;border-bottom:1px solid #e0d8cc">
      ${[
        {label:"TOTAL ITEMS", val:total,    color:"#2a2018", border:"#d4ccc0"},
        {label:"COMPLETED",   val:done,     color:"#16a34a", border:"#bbf7d0"},
        {label:"IN PROGRESS", val:pending,  color:"#d97706", border:"#fde68a"},
        {label:"CANCELED",    val:canceled, color:"#9ca3af", border:"#e5e7eb"},
      ].map(c=>`
        <div style="flex:1;background:#fff;border:1px solid ${c.border};border-radius:10px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,0.05)">
          <div style="font-size:9px;letter-spacing:0.14em;color:#9a8a70;margin-bottom:6px">${c.label}</div>
          <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:600;color:${c.color}">${c.val}</div>
        </div>`).join("")}
      <div style="flex:1.6;background:#fff;border:1px solid #fde68a;border-radius:10px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,0.05)">
        <div style="font-size:9px;letter-spacing:0.14em;color:#9a8a70;margin-bottom:6px">OVERALL COMPLETION</div>
        <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:600;color:#b8893a">${pct}%</div>
        <div style="margin-top:8px;height:5px;background:#f0ece4;border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#b8893a,#d4a855);border-radius:3px"></div>
        </div>
      </div>
    </div>

    <!-- SECTION PROGRESS -->
    <div style="padding:14px 32px;background:#fff;border-bottom:1px solid #e0d8cc">
      <div style="font-size:9px;letter-spacing:0.18em;color:#9a8a70;margin-bottom:10px">PROGRESS BY SECTION</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">${spHTML}</div>
    </div>

    <!-- TABS + LEGEND -->
    <div style="display:flex;gap:6px;padding:10px 32px;background:#f7f4ef;border-bottom:1px solid #e0d8cc;flex-wrap:wrap;align-items:center">
      ${tabsHTML}
      <div style="margin-left:auto;display:flex;align-items:center;gap:14px">
        ${[["#16a34a","Completed"],["#d97706","In Progress"],["#9ca3af","Canceled"]].map(([c,l])=>
          `<div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:7px;background:${c};border-radius:3px"></div><span style="font-size:10px;color:#8a7a6a">${l}</span></div>`
        ).join("")}
        <div style="display:flex;align-items:center;gap:5px"><div style="width:2px;height:14px;background:#dc2626"></div><span style="font-size:10px;color:#8a7a6a">Today</span></div>
      </div>
    </div>

    <!-- GANTT -->
    <div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 300px)">
      <div style="min-width:920px">

        <!-- Month header -->
        <div style="display:flex;position:sticky;top:0;z-index:10;background:#f0ebe0;border-bottom:2px solid #d4ccc0;height:44px;box-shadow:0 1px 4px rgba(0,0,0,0.06)">
          <div style="width:${LW}px;min-width:${LW}px;padding:0 16px;display:flex;align-items:center;font-size:9px;letter-spacing:0.14em;color:#9a8a70;border-right:1px solid #d4ccc0;font-weight:500">
            # &nbsp;&nbsp; TASK DESCRIPTION &amp; AREA
          </div>
          <div style="flex:1;position:relative">
            ${monthH}${weekTicks}
            <div style="position:absolute;left:${TODAY_OFF/DAYS*100}%;top:0;bottom:0;width:2px;background:rgba(220,38,38,0.8);z-index:5">
              <div style="position:absolute;top:5px;left:4px;font-size:8.5px;color:#dc2626;letter-spacing:0.1em;font-weight:700;white-space:nowrap">APR 22</div>
            </div>
          </div>
        </div>

        ${rowsHTML}
        ${noDateHTML}

      </div>
    </div>

    <!-- FOOTER -->
    <div style="padding:10px 32px;background:#fff;border-top:1px solid #e0d8cc;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:9px;color:#b0a080;letter-spacing:0.12em">RCC — DESIGN &amp; SUPERVISION DIVISION</span>
      <span style="font-size:9px;color:#b0a080;letter-spacing:0.12em">VILLA 4 PUNCH LIST R03 &nbsp;·&nbsp; CONFIDENTIAL</span>
    </div>
  </div>`;

  document.querySelectorAll(".stab").forEach(btn=>{
    btn.addEventListener("click",()=>{ activeSection=btn.dataset.sec; render(); });
  });
}

render();
</script>
</body>
</html>
